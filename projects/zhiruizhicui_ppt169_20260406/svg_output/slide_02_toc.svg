  </g>
  
  <!-- 装饰线 -->
  <line x1="120" y1="580" x2="300" y2="580" stroke="#C9A962" stroke-width="0.5" opacity="0.5"/>
  
  <!-- 页码 -->
  <text x="1220" y="680" font-family="Noto Sans SC, sans-serif" font-size="12" 
