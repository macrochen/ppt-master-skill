    <text x="0" y="35" font-family="Noto Sans SC, sans-serif" font-size="24" 
          fill="#C9A962" letter-spacing="8">0酒精 · 0香精 · 0色素 · 0矿物油</text>
  </g>
  
  <!-- 页码 -->
  <text x="1220" y="680" font-family="Noto Sans SC, sans-serif" font-size="12" 
