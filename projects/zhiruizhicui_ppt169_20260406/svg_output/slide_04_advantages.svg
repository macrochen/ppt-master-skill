    <!-- 优势5 -->
    <text x="380" y="100" font-family="Noto Serif SC, serif" font-size="16" 
          fill="#C9A962">安全标准</text>
    <text x="380" y="130" font-family="Noto Sans SC, sans-serif" font-size="13" 
