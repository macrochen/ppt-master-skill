    <!-- 行1 -->
    <rect x="0" y="50" width="140" height="70" fill="none" stroke="#C9A962" stroke-width="0.3" opacity="0.3"/>
    <rect x="140" y="50" width="260" height="70" fill="none" stroke="#C9A962" stroke-width="0.3" opacity="0.3"/>
    <rect x="400" y="50" width="240" height="70" fill="none" stroke="#C9A962" stroke-width="0.3" opacity="0.3"/>
    <rect x="640" y="50" width="180" height="70" fill="none" stroke="#C9A962" stroke-width="0.3" opacity="0.3"/>
    <rect x="820" y="50" width="200" height="70" fill="none" stroke="#C9A962" stroke-width="0.3" opacity="0.3"/>
    
    <text x="70" y="80" font-family="Noto Sans SC, sans-serif" font-size="12" 
