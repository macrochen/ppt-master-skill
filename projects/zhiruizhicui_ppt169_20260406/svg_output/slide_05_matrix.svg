    <rect x="400" y="330" width="240" height="70" fill="none" stroke="#C9A962" stroke-width="0.3" opacity="0.3"/>
    <rect x="640" y="330" width="180" height="70" fill="none" stroke="#C9A962" stroke-width="0.3" opacity="0.3"/>
    <rect x="820" y="330" width="200" height="70" fill="none" stroke="#C9A962" stroke-width="0.3" opacity="0.3"/>
    
