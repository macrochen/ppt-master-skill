    <rect x="140" y="0" width="260" height="50" fill="#2D4A3E" opacity="0.1"/>
    <rect x="400" y="0" width="240" height="50" fill="#2D4A3E" opacity="0.1"/>
    <rect x="640" y="0" width="180" height="50" fill="#2D4A3E" opacity="0.1"/>
    <rect x="820" y="0" width="200" height="50" fill="#2D4A3E" opacity="0.1"/>
    
    <text x="70" y="32" font-family="Noto Sans SC, sans-serif" font-size="13" 
