<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradEnd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F6F0"/>
      <stop offset="100%" style="stop-color:#FAF8F5"/>
    </linearGradient>
  </defs>
  
  <rect width="1280" height="720" fill="url(#bgGradEnd)"/>
  
  <!-- 装饰线 -->
  <line x1="300" y1="250" x2="500" y2="250" stroke="#C9A962" stroke-width="0.5" opacity="0.5"/>
  <line x1="780" y1="250" x2="980" y2="250" stroke="#C9A962" stroke-width="0.5" opacity="0.5"/>
  
  <!-- 主标题 -->
  <text x="640.0" y="320" font-family="Noto Serif SC, serif" font-size="32" 
        fill="#2D4A3E" text-anchor="middle" font-weight="300" letter-spacing="4">
    从田间到瓶身
  </text>
  <text x="640.0" y="370" font-family="Noto Serif SC, serif" font-size="24" 
        fill="#6B6B6B" text-anchor="middle" font-weight="300" letter-spacing="3">
    每一滴都是自然的馈赠
  </text>
  
  <!-- 分隔装饰 -->
  <circle cx="640.0" cy="430" r="3" fill="#C9A962"/>
  <line x1="580.0" y1="430" x2="630.0" y2="430" stroke="#C9A962" stroke-width="0.5"/>
  <line x1="650.0" y1="430" x2="700.0" y2="430" stroke="#C9A962" stroke-width="0.5"/>
  
  <!-- 品牌标语 -->
  <text x="640.0" y="520" font-family="Noto Sans SC, sans-serif" font-size="20" 
        fill="#C9A962" text-anchor="middle" letter-spacing="8">
    植愈身心 · 原生奢养
  </text>
  
  <!-- 页码 -->
  <text x="1220" y="680" font-family="Noto Sans SC, sans-serif" font-size="12" 
        fill="#9B9B9B" text-anchor="end">11</text>
</svg>